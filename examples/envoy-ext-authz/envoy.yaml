# Envoy front proxy with ext_authz HTTP filter pointed at the
# authzen-adapter sidecar, which turns each request into an OpenID
# AuthZEN 1.0 evaluation against the omega-server PDP.
#
# Wire summary:
#   client --> envoy:8000 --(ext_authz HTTP /authz<path>)--> adapter:9000
#   adapter --(POST /access/v1/evaluation)--> omega-server:8080 (Cedar)
#   adapter -> 200 -> envoy -> upstream  |  adapter -> 403 -> envoy -> client 403
#
# The principal is read from the `x-user` request header for the demo;
# in a real deployment it would be a verified JWT subject or the SAN
# URI of a client X.509-SVID.

admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }

static_resources:
  listeners:
    - name: ingress
      address:
        socket_address: { address: 0.0.0.0, port_value: 8000 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: AUTO
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: httpbin }
                http_filters:
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      transport_api_version: V3
                      failure_mode_allow: false
                      http_service:
                        server_uri:
                          uri: http://authzen-adapter:9000
                          cluster: ext_authz
                          timeout: 2s
                        path_prefix: /authz
                        authorization_request:
                          allowed_headers:
                            patterns:
                              - exact: x-user
                              - exact: x-request-id
                              - exact: content-type
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: httpbin
      type: STRICT_DNS
      connect_timeout: 2s
      load_assignment:
        cluster_name: httpbin
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: httpbin, port_value: 80 }

    - name: ext_authz
      type: STRICT_DNS
      connect_timeout: 1s
      load_assignment:
        cluster_name: ext_authz
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: authzen-adapter, port_value: 9000 }
