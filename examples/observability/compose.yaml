# examples/observability/compose.yaml
#
# Self-contained stack:
#   - omega-server     (control plane with /metrics, OTLP traces enabled)
#   - prometheus       (scrapes omega-server every 5s)
#   - grafana          (auto-loads the Omega dashboard)
#   - otel-collector   (receives OTLP from omega-server, forwards to jaeger)
#   - jaeger           (OTLP receiver + trace UI)
#
# Run from this directory:
#
#     docker compose up --build
#
# Then open:
#   - http://localhost:19090  Prometheus
#   - http://localhost:13001  Grafana (anonymous Admin, dashboard: "Omega control plane")
#   - http://localhost:16686  Jaeger UI (service: omega-server)
#   - http://localhost:18080/metrics  raw metrics
#
# (Ports are intentionally non-default so this example can run alongside the
# top-level `compose.yaml` quickstart without colliding on 8080/9090/3000.)
#
# Stop and clean up:
#
#     docker compose down -v

name: omega-observability

services:
  omega-server:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: omega:dev
    user: "0:0"
    command:
      - server
      - --http-addr=0.0.0.0:8080
      - --data-dir=/var/lib/omega
      - --otlp-endpoint=otel-collector:4318
      - --otlp-insecure
    ports:
      - "18080:8080"
    volumes:
      - omega-data:/var/lib/omega
    depends_on:
      - otel-collector

  prometheus:
    image: prom/prometheus:v3.6.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=2h
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "19090:9090"
    depends_on:
      - omega-server

  grafana:
    image: grafana/grafana-oss:11.6.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "13001:3000"
    depends_on:
      - prometheus

  # OpenTelemetry collector: terminates OTLP from omega-server and forwards
  # spans to jaeger over OTLP/gRPC. Keeping a collector in the loop (rather
  # than pointing the agent straight at jaeger) is what real deployments
  # look like — it's where sampling, batching, and SIEM fan-out land.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.117.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel/config.yaml:ro
    depends_on:
      - jaeger

  # Jaeger all-in-one: OTLP/gRPC :4317, OTLP/HTTP :4318, UI :16686.
  # Uses in-memory storage; resets on every `compose down -v`.
  jaeger:
    image: jaegertracing/all-in-one:1.65.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"

volumes:
  omega-data:
